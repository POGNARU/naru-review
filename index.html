<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>모닝페이지 회고 · 포근나루</title>
  <meta name="description" content="고요한 새벽에 쓴 글을 돌아보는 자리. 포근나루 모닝페이지 회고 리포트." />

  <!-- 포근나루 브랜드 폰트 -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Gowun+Dodum&family=Nanum+Myeongjo:wght@400;700;800&display=swap" rel="stylesheet" />

  <style>
    :root {
      --cream: #FAF3EA;
      --apricot: #F5EBE0;
      --terracotta-light: #C8845A;
      --terracotta-deep: #C4763A;
      --dark-brown: #3C2415;

      --brown-soft: rgba(60, 36, 21, 0.62);
      --brown-faint: rgba(60, 36, 21, 0.40);

      --font-title: "Gowun Batang", serif;
      --font-body: "Nanum Myeongjo", serif;
      --font-sub: "Gowun Dodum", sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-body);
      color: var(--dark-brown);
      background:
        radial-gradient(120% 90% at 50% -10%, #FFFBF5 0%, var(--cream) 46%, #F3E7D8 100%);
      min-height: 100vh;
      line-height: 1.85;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    .page {
      max-width: 720px;
      margin: 0 auto;
      padding: clamp(56px, 11vw, 120px) clamp(22px, 6vw, 40px) 80px;
    }

    /* ── 헤더 ───────────────────────────── */
    header {
      text-align: center;
      margin-bottom: clamp(48px, 9vw, 84px);
    }

    .kicker {
      font-family: var(--font-sub);
      font-size: 0.82rem;
      letter-spacing: 0.42em;
      text-transform: uppercase;
      color: var(--terracotta-deep);
      margin-bottom: 22px;
      opacity: 0;
      animation: rise 0.9s ease forwards;
    }

    h1 {
      font-family: var(--font-title);
      font-weight: 700;
      font-size: clamp(2.1rem, 6.5vw, 3.1rem);
      letter-spacing: 0.01em;
      line-height: 1.3;
      margin-bottom: 22px;
      opacity: 0;
      animation: rise 0.9s ease 0.12s forwards;
    }

    .subtitle {
      font-family: var(--font-body);
      font-size: clamp(0.98rem, 2.6vw, 1.1rem);
      color: var(--brown-soft);
      max-width: 30ch;
      margin: 0 auto;
      opacity: 0;
      animation: rise 0.9s ease 0.24s forwards;
    }

    /* 브랜드 그라데이션 라인 */
    .gradient-line {
      width: clamp(140px, 40%, 240px);
      height: 2px;
      margin: 34px auto 0;
      border-radius: 2px;
      background: linear-gradient(90deg,
        var(--apricot) 0%,
        var(--terracotta-light) 50%,
        var(--dark-brown) 100%);
      opacity: 0;
      animation: widen 1.1s ease 0.34s forwards;
    }

    /* ── 월별 섹션 ──────────────────────── */
    .month-block {
      margin-bottom: 52px;
      opacity: 0;
      animation: rise 0.9s ease 0.46s forwards;
    }

    .month-label {
      font-family: var(--font-sub);
      font-size: 0.84rem;
      letter-spacing: 0.22em;
      color: var(--brown-faint);
      padding-left: 6px;
      margin-bottom: 18px;
    }

    /* ── 회고 카드 ──────────────────────── */
    .report-card {
      display: flex;
      align-items: center;
      gap: 22px;
      background: var(--apricot);
      border: 1px solid rgba(200, 132, 90, 0.18);
      border-radius: 18px;
      padding: 24px 26px;
      margin-bottom: 14px;
      text-decoration: none;
      color: inherit;
      transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1),
                  box-shadow 0.4s ease,
                  border-color 0.4s ease;
    }

    .report-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 34px -18px rgba(60, 36, 21, 0.42);
      border-color: rgba(200, 132, 90, 0.42);
    }

    .date-mark {
      flex-shrink: 0;
      width: 62px;
      text-align: center;
      border-right: 1px solid rgba(60, 36, 21, 0.14);
      padding-right: 20px;
    }

    .date-day {
      font-family: var(--font-title);
      font-weight: 700;
      font-size: 1.9rem;
      line-height: 1;
      color: var(--dark-brown);
    }

    .date-month {
      font-family: var(--font-sub);
      font-size: 0.72rem;
      letter-spacing: 0.16em;
      color: var(--terracotta-deep);
      margin-top: 6px;
    }

    .report-info { flex: 1; }

    .report-title {
      font-family: var(--font-title);
      font-weight: 700;
      font-size: 1.18rem;
      margin-bottom: 4px;
    }

    .report-desc {
      font-family: var(--font-sub);
      font-size: 0.86rem;
      color: var(--brown-soft);
    }

    .arrow {
      flex-shrink: 0;
      font-size: 1.3rem;
      color: var(--terracotta-light);
      transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1),
                  color 0.4s ease;
    }

    .report-card:hover .arrow {
      transform: translateX(5px);
      color: var(--terracotta-deep);
    }

    /* ── 빈 상태 안내(리포트 추가용 주석) ── */

    /* ── 푸터 ───────────────────────────── */
    footer {
      text-align: center;
      margin-top: clamp(56px, 10vw, 90px);
      opacity: 0;
      animation: rise 0.9s ease 0.6s forwards;
    }

    .footer-logo {
      font-family: var(--font-title);
      font-weight: 700;
      font-size: 1.05rem;
      letter-spacing: 0.06em;
      color: var(--terracotta-deep);
      margin-bottom: 8px;
    }

    .footer-tagline {
      font-family: var(--font-body);
      font-size: 0.88rem;
      color: var(--brown-faint);
    }

    /* ── 모션 ───────────────────────────── */
    @keyframes rise {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes widen {
      from { opacity: 0; transform: scaleX(0.3); }
      to   { opacity: 1; transform: scaleX(1); }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation: none !important;
        transition: none !important;
        opacity: 1 !important;
      }
    }

    @media (max-width: 460px) {
      .report-card { gap: 16px; padding: 20px; }
      .date-mark { width: 52px; padding-right: 14px; }
      .date-day { font-size: 1.6rem; }
    }
  </style>
</head>
<body>
  <main class="page">
    <header>
      <div class="kicker">Morning Pages</div>
      <h1>새벽에 적어 둔 마음을<br />다시 펼쳐 보는 자리</h1>
      <p class="subtitle">고요히 흘려보낸 문장들을 모아,<br />달마다 가만히 돌아봅니다.</p>
      <div class="gradient-line"></div>
    </header>

    <!--
      ▸ 새 회고 리포트를 추가할 때
        1) 해당 월의 .month-block 안에 .report-card 한 줄을 복사해 붙입니다.
        2) href · 날짜(date-day/date-month) · 제목만 바꾸면 됩니다.
        3) 새로운 달이면 .month-block 자체를 복사해 .month-label을 바꿉니다.
    -->

    <!-- ── 주간 회고 섹션 ── -->
    <section class="month-block">
      <div class="month-label">주간 회고 · 2026</div>

      <a class="report-card" href="2026-06-20-week-review.html">
        <div class="date-mark">
          <div class="date-day">20</div>
          <div class="date-month">JUN</div>
        </div>
        <div class="report-info">
          <div class="report-title">나는 무엇이 두려운 걸까</div>
          <div class="report-desc">6월 셋째 주 · 자제력, 부채감, 독립에 대하여</div>
        </div>
        <div class="arrow">→</div>
      </a>
    </section>

    <!-- ── 월간 회고 섹션 ── -->
    <section class="month-block">
      <div class="month-label">2026 · 5월</div>

      <a class="report-card" href="2026-05-review.html">
        <div class="date-mark">
          <div class="date-day">31</div>
          <div class="date-month">MAY</div>
        </div>
        <div class="report-info">
          <div class="report-title">5월 모닝페이지 회고</div>
          <div class="report-desc">원천 텍스트를 발견한 달의 기록 (15일)</div>
        </div>
        <div class="arrow">→</div>
      </a>
    </section>

    <section class="month-block">
      <div class="month-label">2026 · 4월</div>

      <a class="report-card" href="2026-04-05-review.html">
        <div class="date-mark">
          <div class="date-day">05</div>
          <div class="date-month">APR</div>
        </div>
        <div class="report-info">
          <div class="report-title">4월 모닝페이지 회고</div>
          <div class="report-desc">한 달간의 새벽 기록을 돌아본 리포트</div>
        </div>
        <div class="arrow">→</div>
      </a>
    </section>

    <footer>
      <div class="footer-logo">포근나루</div>
      <div class="footer-tagline">고요히, 마음에 머무는 글.</div>
    </footer>
  </main>
</body>
</html>
